<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bad_parents // TikTok Block</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    :root {
      --orange: #ff6a00;
      --red:    #ff2020;
      --green:  #00e676;
      --dark:   #0d0600;
      --panel:  #140900;
      --dim:    #6b3000;
      --text:   #ffe8cc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    /* CRT scanlines */
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,0,0,0.15) 3px, rgba(0,0,0,0.15) 4px
      );
      pointer-events: none; z-index: 999;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.8) 100%);
      pointer-events: none; z-index: 998;
    }

    /* Alert flash when blocking */
    #alert-bg {
      position: fixed; inset: 0; z-index: 0;
      background: var(--red); opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #alert-bg.flash { animation: alert-flash 0.6s ease-out forwards; }
    @keyframes alert-flash { 0%{opacity:0.25} 100%{opacity:0} }

    .panel {
      position: relative; z-index: 1;
      width: min(560px, 96vw);
      border: 1px solid var(--orange);
      background: var(--panel);
      box-shadow: 0 0 40px rgba(255,106,0,0.15), inset 0 0 60px rgba(0,0,0,0.5);
    }

    /* Title bar */
    .title-bar {
      background: var(--orange);
      padding: 0.3rem 0.85rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.72rem; color: var(--dark); letter-spacing: 0.06em;
    }
    .title-bar .left { font-weight: bold; }

    .body { padding: 1.5rem 1.6rem; }

    /* Header */
    .headline {
      font-size: 2rem; letter-spacing: 0.15em;
      color: var(--orange);
      text-shadow: 0 0 20px rgba(255,106,0,0.6);
      margin-bottom: 0.2rem;
    }
    .sub {
      font-size: 0.72rem; color: var(--dim);
      margin-bottom: 1.4rem; letter-spacing: 0.06em;
    }
    .sub span { color: var(--text); }

    /* Status strip */
    .status-strip {
      font-size: 0.72rem; color: var(--dim);
      border: 1px solid #2a1500;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1.3rem;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.2rem 1rem;
    }
    .status-strip .label { color: #4a2500; }
    .status-strip .val   { color: var(--text); }
    .status-strip .val.ok     { color: var(--green); }
    .status-strip .val.active { color: var(--red); }

    /* Big block button */
    #block-btn {
      display: block; width: 100%;
      padding: 1.1rem;
      font-family: inherit; font-size: 1.15rem;
      letter-spacing: 0.14em; text-transform: uppercase;
      background: transparent; color: var(--orange);
      border: 2px solid var(--orange);
      cursor: pointer;
      transition: background 0.12s, box-shadow 0.12s;
      margin-bottom: 0.75rem;
    }
    #block-btn:hover  { background: rgba(255,106,0,0.08); box-shadow: 0 0 24px rgba(255,106,0,0.35); }
    #block-btn:active { background: rgba(255,106,0,0.18); }
    #block-btn:disabled { color: var(--dim); border-color: var(--dim); cursor: not-allowed; box-shadow: none; background: transparent; }
    #block-btn.blocking {
      color: var(--red); border-color: var(--red);
      box-shadow: 0 0 20px rgba(255,32,32,0.3);
    }

    /* Countdown display */
    #countdown-wrap {
      margin-top: 1.1rem;
      min-height: 5.5rem;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      border: 1px solid #2a1500;
      background: #0a0400;
      position: relative; overflow: hidden;
    }

    #countdown-text {
      font-size: 3.8rem; letter-spacing: 0.1em;
      color: #2a1500; user-select: none;
    }
    #countdown-text.idle {}
    #countdown-text.active {
      color: var(--red);
      text-shadow: 0 0 12px var(--red), 0 0 30px rgba(255,32,32,0.4);
      animation: cd-pulse 1s step-end infinite;
    }
    #countdown-text.done {
      color: var(--green);
      text-shadow: 0 0 12px var(--green), 0 0 30px rgba(0,230,118,0.4);
      animation: cd-flash 0.12s step-end 6;
    }
    @keyframes cd-pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    @keyframes cd-flash { 0%{opacity:0} 50%,100%{opacity:1} }

    #countdown-label {
      font-size: 0.68rem; color: var(--dim); letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }

    /* Countdown sweep line */
    #countdown-wrap::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 44%, rgba(255,32,32,0.05) 50%, transparent 56%);
      animation: sweep 2s linear infinite; opacity: 0; transition: opacity 0.2s;
    }
    #countdown-wrap.active::after { opacity: 1; }

    @keyframes sweep { 0%{transform:translateY(-100%)} 100%{transform:translateY(100%)} }

    /* Unblock button */
    #unblock-btn {
      display: none; width: 100%; margin-top: 0.6rem;
      padding: 0.6rem;
      font-family: inherit; font-size: 0.82rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: transparent; color: var(--dim);
      border: 1px solid var(--dim); cursor: pointer;
      transition: color 0.1s, border-color 0.1s;
    }
    #unblock-btn:hover { color: var(--green); border-color: var(--green); }
    #unblock-btn.show { display: block; }

    /* Error */
    #error-msg {
      margin-top: 0.85rem; font-size: 0.72rem;
      color: var(--red); display: none;
      border-left: 2px solid var(--red); padding-left: 0.6rem;
      line-height: 1.6;
    }
    #error-msg.show { display: block; }

    .footer {
      margin-top: 1rem; font-size: 0.62rem;
      color: #2a1500; text-align: right; letter-spacing: 0.05em;
    }

    .blink { animation: blink 1s step-end infinite; }
    @keyframes blink { 50%{opacity:0} }
  </style>
</head>
<body>

<div id="alert-bg"></div>

<div class="panel">
  <div class="title-bar">
    <span class="left">bad_parents // NETWORK CONTROL</span>
    <span id="tb-clock">--:--:--</span>
  </div>

  <div class="body">
    <div class="headline">TIKTOK BLOCK</div>
    <div class="sub">
      TARGET: <span>ALL WiFi CLIENTS</span> &nbsp;·&nbsp;
      RULE: <span id="rule-name">—</span> &nbsp;·&nbsp;
      DURATION: <span id="duration">5 MIN</span>
    </div>

    <div class="status-strip">
      <span class="label">CONTROLLER</span><span class="val" id="s-ctrl">—</span>
      <span class="label">BLOCK STATUS</span><span class="val" id="s-status">IDLE</span>
    </div>

    <button id="block-btn">⚡ GROUND THEM — BLOCK TIKTOK</button>

    <div id="countdown-wrap">
      <div id="countdown-text">--:--</div>
      <div id="countdown-label">AWAITING COMMAND</div>
    </div>

    <button id="unblock-btn">✓ UNBLOCK — RESTORE ACCESS</button>

    <div id="error-msg"></div>

    <div class="footer">UniFi UDM // Traffic Rules API // bad_parents v1.0</div>
  </div>
</div>

<script>
  const blockBtn   = document.getElementById('block-btn');
  const unblockBtn = document.getElementById('unblock-btn');
  const cdText     = document.getElementById('countdown-text');
  const cdLabel    = document.getElementById('countdown-label');
  const cdWrap     = document.getElementById('countdown-wrap');
  const errorMsg   = document.getElementById('error-msg');
  const alertBg    = document.getElementById('alert-bg');

  const pad = n => String(n).padStart(2,'0');

  // ── Clock ──────────────────────────────────────────────────────────────────
  function tick_clock(){
    const n = new Date();
    document.getElementById('tb-clock').textContent =
      `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  }
  setInterval(tick_clock,1000); tick_clock();

  // ── Status polling ─────────────────────────────────────────────────────────
  let unblockAt = null;

  function applyStatus(s) {
    document.getElementById('rule-name').textContent = s.rule_name || '—';
    document.getElementById('duration').textContent  = `${s.block_minutes} MIN`;
    document.getElementById('s-ctrl').textContent    = 'CONNECTED';

    if (s.error) {
      errorMsg.textContent = '⚠ ' + s.error;
      errorMsg.classList.add('show');
    } else {
      errorMsg.classList.remove('show');
    }

    if (s.blocked) {
      unblockAt = s.unblock_at * 1000;
      document.getElementById('s-status').textContent = 'BLOCKING';
      document.getElementById('s-status').className   = 'val active';
      blockBtn.disabled = true;
      blockBtn.classList.add('blocking');
      blockBtn.textContent = '🔴 TIKTOK IS BLOCKED';
      unblockBtn.classList.add('show');
      cdWrap.classList.add('active');
      cdText.className = 'active';
    } else {
      unblockAt = null;
      document.getElementById('s-status').textContent = 'IDLE';
      document.getElementById('s-status').className   = 'val ok';
      blockBtn.disabled = false;
      blockBtn.classList.remove('blocking');
      blockBtn.textContent = '⚡ GROUND THEM — BLOCK TIKTOK';
      unblockBtn.classList.remove('show');
      cdWrap.classList.remove('active');
      if (cdText.className === 'active') {
        cdText.className = 'done';
        cdText.textContent = 'FREE';
        cdLabel.textContent = 'ACCESS RESTORED';
        setTimeout(() => {
          cdText.className  = 'idle';
          cdText.textContent= '--:--';
          cdLabel.textContent = 'AWAITING COMMAND';
        }, 3000);
      }
    }
  }

  async function pollStatus() {
    try {
      const r = await fetch('/api/status');
      applyStatus(await r.json());
    } catch(e) {
      document.getElementById('s-ctrl').textContent = 'OFFLINE';
    }
  }
  pollStatus();
  setInterval(pollStatus, 10000);

  // ── Countdown ticker ───────────────────────────────────────────────────────
  setInterval(() => {
    if (!unblockAt) return;
    const rem = Math.max(0, unblockAt - Date.now());
    const s   = Math.ceil(rem / 1000);
    const m   = Math.floor(s / 60);
    cdText.textContent  = `${pad(m)}:${pad(s % 60)}`;
    cdLabel.textContent = `TIKTOK BLOCKED — ${m}:${pad(s%60)} REMAINING`;
  }, 500);

  // ── Block ──────────────────────────────────────────────────────────────────
  blockBtn.addEventListener('click', async () => {
    blockBtn.disabled = true;
    blockBtn.textContent = 'SENDING COMMAND...';
    alertBg.className = '';
    void alertBg.offsetWidth;
    alertBg.classList.add('flash');
    try {
      await fetch('/api/block', { method: 'POST' });
      await pollStatus();
    } catch(e) {
      errorMsg.textContent = '⚠ ' + e.message;
      errorMsg.classList.add('show');
      blockBtn.disabled = false;
      blockBtn.textContent = '⚡ GROUND THEM — BLOCK TIKTOK';
    }
  });

  // ── Unblock ────────────────────────────────────────────────────────────────
  unblockBtn.addEventListener('click', async () => {
    unblockBtn.disabled = true;
    try {
      await fetch('/api/unblock', { method: 'POST' });
      await pollStatus();
    } finally {
      unblockBtn.disabled = false;
    }
  });
</script>

</body>
</html>
